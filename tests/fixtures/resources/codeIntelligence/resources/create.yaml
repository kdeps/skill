actionId: createFile
name: Create Test Source
exec:
  command: |
    mkdir -p /tmp/skill-test-codeintel
    printf 'package main\n\nfunc parseInput(data string) string {\n\treturn "parsed: " + data\n}\n\nfunc main() {\n\tresult := parseInput("hello")\n\tprintln(result)\n}\n' > /tmp/skill-test-codeintel/main.go
    echo '{"created": true}'
  timeout: 10s
