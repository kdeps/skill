apiVersion: kdeps.io/v1
kind: Workflow

metadata:
  name: skill-test-exec
  version: "1.0.0"
  description: Skill fixture — exec resource
  targetActionId: respond

settings:
  apiServer:
    hostIp: "127.0.0.1"
    portNum: 17601
    routes:
      - path: /api/v1/exec
        methods: [GET]
  agentSettings:
    timezone: UTC

tests:
  - name: exec endpoint returns 200
    request:
      method: GET
      path: /api/v1/exec
    assert:
      status: 200