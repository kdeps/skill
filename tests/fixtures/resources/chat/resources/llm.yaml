actionId: llm
name: LLM Chat
validations:
  methods: [POST]
  routes: [/api/v1/chat]
  check:
    - get('q') != ''
  error:
    code: 400
    message: "'q' is required"
chat:
  model: llama3.2:1b
  role: user
  # Runtime conversation history: array of {role, content} from the request
  # body, inserted before the prompt. Empty/absent history adds no messages.
  messages: "{{ get('history') }}"
  prompt: "{{ get('q') }}"
  timeout: 60s