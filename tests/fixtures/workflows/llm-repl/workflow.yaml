apiVersion: kdeps.io/v1
kind: Workflow

metadata:
  name: skill-test-llm-repl
  version: "1.0.0"
  description: Skill fixture — settings.llm stdin REPL (kdeps serve / --interactive)
  targetActionId: chat

settings:
  input:
    sources: [api]
  llm:
    executionType: stdin
    prompt: "You: "
    sessionId: skill-llm-session
  agentSettings:
    timezone: UTC
    installOllama: true